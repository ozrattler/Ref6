server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trust Nginx Proxy Manager as upstream reverse proxy
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options      "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"   always;
    add_header Referrer-Policy      "strict-origin-when-cross-origin" always;

    # Correct MIME type for web app manifest
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-store";
    }

    # Hashed static assets — cache forever (filenames change on rebuild)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Icons and other public files — short cache
    location ~* \.(png|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA catch-all — always serve index.html for unknown paths
    # (HashRouter handles client-side routing via the # fragment)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
}
